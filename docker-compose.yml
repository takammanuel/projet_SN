services:
  app:
    build: .
    container_name: kaba_backend
    restart: unless-stopped
    tty: true
    ports:
      - "8000:8000"
    volumes:
      - ./:/var/www
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: kaba_db
    restart: unless-stopped
    tty: true
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: evaluation_sn
      MYSQL_ROOT_PASSWORD: root_password_securise
    volumes:
      - kaba_db_data:/var/lib/mysql

volumes:
  kaba_db_data:
